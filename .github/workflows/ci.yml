name: ci

on:
  pull_request:
    branches: [main]
    paths:
      - '**.sol'
      - '**.ts'
      - '**.yml'
      - '.env.example'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.json'
  push:
    branches: [main]
    paths:
      - '**.sol'
      - '**.ts'
      - '**.yml'
      - '.env.example'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.json'
jobs:
  tests:
    name: Forge Testing
    runs-on: ubuntu-latest

    strategy:
      matrix:
        profile: [regular,intense]

    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Dependencies
        run: forge install

      - name: Run Tests with ${{ matrix.profile }}
        run: >
          ( [ "${{ matrix.profile }}" = "regular" ] &&
            forge test --disable-labels
          ) ||
          ( [ "${{ matrix.profile }}" = "intense" ] &&
            forge test --disable-labels --fuzz-runs 5000
          )

  gasback-live-system:
    name: Gasback live system checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install Foundry Dependencies
        run: forge install

      - name: Install TypeScript Dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript Tests
        run: bun run lint

      - name: Run Local Gasback Suite
        run: bun run gasback:local

      - name: Run Fork Gasback Suite
        run: bun run gasback:fork

  codespell:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2.0
        with:
          check_filenames: true
          ignore_words_list: usera
          skip: ./.git,package-lock.json,ackee-blockchain-solady-report.pdf,EIP712Mock.sol
